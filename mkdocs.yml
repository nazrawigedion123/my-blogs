site_name: Nazrawi's Blogs
site_description: Technical notes, engineering lessons, and practical software guides.
site_author: Nazrawi Gedion

theme:
  name: material
  language: en
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - blog:
      blog_dir: blog
      post_dir: "{blog}/posts"
      blog_toc: true
      post_date_format: medium
      post_url_date_format: yyyy/MM/dd

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Blog:
      - blog/index.md
  - Pages:
      - About: pages/about.md
